<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Momentum</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-mark" data-icon="quote"></span><span>Momentum</span></div>
      <div class="topbar-actions">
        <span class="today-label" id="todayLabel"></span>
        <button id="themeToggle" class="icon-button theme-toggle" type="button" aria-pressed="false" aria-label="Toggle theme">
          <span class="theme-icon theme-icon-sun" data-icon="sun"></span>
          <span class="theme-icon theme-icon-moon" data-icon="moon"></span>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="surface year-progress-container">
        <div class="panel-heading">
          <div><span class="eyebrow">Year progress</span><div class="year-title" id="yearTitle">2026</div></div>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-grid" id="progressGrid"></div>
        <div class="progress-stats" id="progressStats"></div>
      </aside>

      <div class="content-stack">
        <section class="surface quote-card" aria-live="polite">
          <div class="quote-card-head">
            <span class="eyebrow">A thought for now</span>
            <div class="actions">
              <button id="nextQuote" type="button" class="icon-button" data-icon="refresh" aria-label="Show another quote" title="Another quote"></button>
              <button id="manageQuotes" type="button" class="icon-button" data-icon="settings" aria-label="Open settings" title="Settings"></button>
            </div>
          </div>
          <div class="quote-mark" data-icon="quote"></div>
          <blockquote class="quote-text" id="quoteText"></blockquote>
          <div class="quote-author" id="quoteAuthor"></div>
        </section>

        <section class="surface shortcuts" aria-label="Your sites">
          <div class="section-heading">
            <div><span class="eyebrow">Shortcuts</span><h2>Your sites</h2></div>
            <span class="section-hint">Drag to reorder</span>
          </div>
          <div class="tiles" id="siteList"></div>
          <div class="empty" id="sitesEmpty" hidden>No sites yet. Add your first shortcut.</div>
        </section>
      </div>

      <aside class="right-rail">
        <section class="surface quick-notes is-collapsed" id="quickNotes" aria-label="Quick notes">
          <div class="quick-notes-head">
            <span class="rail-title"><span class="rail-icon" data-icon="note"></span>Quick notes</span>
            <button id="notesToggle" class="icon-button small" type="button" data-icon="plus" aria-expanded="false" aria-label="Expand notes"></button>
          </div>
          <textarea id="notesInput" class="quick-notes-input" rows="1" placeholder="Add a quick reminder..."></textarea>
        </section>

        <section class="surface timer-card" id="focusTimerCard" aria-label="Focus timer">
          <div class="timer-head">
            <span class="rail-title"><span class="rail-icon" data-icon="timer"></span>Focus timer</span>
            <span class="timer-status" id="focusTimerStatus">Idle</span>
          </div>
          <div class="timer-display" id="focusTimerDisplay">25:00</div>
          <div class="timer-meta" id="focusTimerMeta">Progress appears on floating clock</div>
          <div class="timer-duration-row">
            <label for="focusTimerMinutes">Duration</label>
            <input id="focusTimerMinutes" type="number" min="1" max="180" step="1" value="25" />
            <span class="timer-unit">min</span>
          </div>
          <div class="timer-controls">
            <button id="focusTimerStart" type="button" class="primary" data-icon="play">Start</button>
            <button id="focusTimerPause" type="button" class="ghost" data-icon="pause">Pause</button>
            <button id="focusTimerReset" type="button" class="ghost" data-icon="rotate">Reset</button>
          </div>
        </section>
      </aside>
    </div>

    <div class="empty empty-page" id="emptyState" hidden>
      <span class="empty-icon" data-icon="quote"></span>
      <p>No quotes yet. Add your first quote to begin.</p>
      <button id="openOptions" type="button" class="primary" data-icon="plus">Open quote manager</button>
    </div>
  </main>

  <div class="modal" id="siteModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="siteModalTitle">
      <div class="modal-header">
        <div><span class="eyebrow">Shortcut</span><h2 id="siteModalTitle">Add site</h2></div>
        <button id="closeModal" type="button" class="icon-button" data-icon="close" aria-label="Close"></button>
      </div>
      <form id="addSiteForm" class="site-form">
        <label><span>Name</span><input id="siteName" type="text" placeholder="Journal" autocomplete="off" /></label>
        <label><span>URL</span><input id="siteUrl" type="text" inputmode="url" placeholder="https://example.com" required /></label>
        <div class="modal-actions">
          <button id="cancelAdd" type="button" class="ghost">Cancel</button>
          <button id="addSite" type="submit" class="primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <script src="ui-icons.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
